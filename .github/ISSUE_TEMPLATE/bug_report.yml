name: Bug Report
description: Report a bug in the installer, setup scripts, smoke test, or any other end-user code
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - isatuncer
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        **Before you start:** please check [existing issues](https://github.com/isatuncer/ClaudeCodeCTO/issues) to see if this is already reported.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of what went wrong.
      placeholder: "Setup script fails at Phase 3 — Submodule Sanity Check with..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact commands you ran, in order.
      placeholder: |
        1. `curl -fsSL https://raw.githubusercontent.com/isatuncer/ClaudeCodeCTO/main/install.sh | bash`
        2. Enter target directory when prompted
        3. Error appears at ...
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: "The installer should have cloned all 14 submodules and proceeded to..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages verbatim.
      placeholder: "Installer exited with error code 1 and the following output..."
      render: shell
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11 (git-bash)
        - Windows 10 (git-bash)
        - macOS (latest)
        - macOS (older)
        - Ubuntu / Debian
        - Fedora / RHEL
        - Arch / Manjaro
        - WSL2
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: Tool Versions
      description: Output of `bash --version | head -1; python --version; git --version`
      placeholder: "GNU bash 5.2 / Python 3.11.5 / git 2.42.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Setup Log
      description: Contents of `decisions/setup.log` (paste or attach)
      render: text

  - type: textarea
    id: smoke
    attributes:
      label: Smoke Test Report
      description: Contents of `decisions/smoke-test-report.md` if the smoke test failed
      render: markdown

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues
          required: true
        - label: I have tried a clean install (`rm -rf ~/.claude && bash scripts/setup.sh`)
          required: false
        - label: The bug is reproducible (not a one-time glitch)
          required: true
