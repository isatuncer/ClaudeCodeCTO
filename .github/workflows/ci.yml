name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------
  # Lint: shellcheck + JSON validation
  # -----------------------------------------------------------
  lint:
    name: Lint (shellcheck + JSON)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck on all bash scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
          additional_files: 'install.sh'
        env:
          SHELLCHECK_OPTS: -e SC2034 -e SC2155 -e SC2086

      - name: Validate JSON in decisions/
        run: |
          set -e
          for f in decisions/*.json; do
            echo "Checking $f..."
            python3 -c "import json; json.load(open('$f', encoding='utf-8'))"
          done
          echo "All JSON files valid."

      - name: Validate install.tsv + profile TSVs
        run: |
          set -e
          # Master list
          total=$(grep -v '^#' decisions/install.tsv | grep -c '[^[:space:]]')
          echo "install.tsv has $total component rows"
          if [ "$total" -lt 2000 ]; then
            echo "::error::install.tsv has suspiciously few rows ($total)"
            exit 1
          fi
          # Each profile TSV exists + has at least N rows
          declare -A min_rows=( [minimal]=30 [standard]=200 [full]=2000 )
          for p in minimal standard full; do
            f="decisions/profiles/$p.tsv"
            if [ ! -f "$f" ]; then
              echo "::error::missing profile file $f — run python scripts/curate_profiles.py"
              exit 1
            fi
            rows=$(grep -v '^#' "$f" | grep -c '[^[:space:]]' || echo 0)
            echo "  $p.tsv: $rows rows (min ${min_rows[$p]})"
            if [ "$rows" -lt "${min_rows[$p]}" ]; then
              echo "::error::$p.tsv has too few rows ($rows < ${min_rows[$p]})"
              exit 1
            fi
          done
          # Verify all rows have exactly 3 tab-separated fields (all TSVs)
          for f in decisions/install.tsv decisions/profiles/*.tsv; do
            bad=$(grep -v '^#' "$f" | awk -F'\t' 'NF != 3 && NF > 0 {print NR": "NF" fields"}' | head -5)
            if [ -n "$bad" ]; then
              echo "::error::$f has malformed rows:"
              echo "$bad"
              exit 1
            fi
          done

      - name: Check decisions/assets/ exists
        run: |
          set -e
          for required in \
            decisions/assets/skills/project-lifecycle/SKILL.md \
            decisions/assets/commands/start-project.md \
            decisions/assets/config/lifecycle.json; do
            if [ ! -f "$required" ]; then
              echo "::error::Missing required asset: $required"
              exit 1
            fi
          done
          echo "All required assets present"

  # -----------------------------------------------------------
  # Setup dry-run: verify the installer flow on Ubuntu + macOS
  # -----------------------------------------------------------
  dry-run:
    name: Setup dry-run (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create fake ~/.claude/ with credentials
        run: |
          mkdir -p "$HOME/.claude"
          echo '{"fake": "credentials"}' > "$HOME/.claude/.credentials.json"

      - name: Run setup in check mode
        run: bash scripts/setup.sh --check

      - name: Run setup in dry-run mode (auto)
        run: bash scripts/setup.sh --auto --dry-run --no-smoke

      - name: Run installer in dry-run mode
        run: bash scripts/installer.sh --dry-run

      - name: Upload setup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-log-${{ matrix.os }}
          path: decisions/setup.log
          if-no-files-found: ignore

  # -----------------------------------------------------------
  # Markdown lint: ensure READMEs stay well-formed
  # -----------------------------------------------------------
  markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint main READMEs
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README.md
            README.tr.md
            docs/i18n/README.*.md
            CHANGELOG.md
            CONTRIBUTING.md
            SECURITY.md
        continue-on-error: true  # informational only — don't block PRs

  # -----------------------------------------------------------
  # Submodule sanity: ensure .gitmodules matches reality
  # -----------------------------------------------------------
  submodules:
    name: Submodule sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count submodules in .gitmodules
        run: |
          count=$(grep -c "^\[submodule " .gitmodules)
          echo "Submodules declared: $count"
          if [ "$count" -ne 14 ]; then
            echo "::error::Expected 14 submodules, found $count"
            exit 1
          fi
